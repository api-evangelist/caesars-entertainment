notes: |
  Caesars Entertainment does not publish a public, general-purpose developer API or developer pricing.
  Consumer-facing digital products (Caesars Rewards loyalty, hotel booking, sportsbook) are sold to
  end-users; partner integrations (OTA, sportsbook B2B, loyalty data) are governed by private contracts
  rather than a self-service plan.
